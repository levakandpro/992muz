<!-- NAVBAR -->
<div id="navbarPlaceholder"></div>
<script>
  fetch('components/navbar.html')
    .then(r => r.text())
    .then(html => {
      const temp = document.createElement('div');
      temp.innerHTML = html;
      const placeholder = document.getElementById('navbarPlaceholder');
      Array.from(temp.childNodes).forEach(node => {
        if (node.tagName === 'SCRIPT') return;
        placeholder.parentNode.insertBefore(node, placeholder);
      });
      const scripts = temp.querySelectorAll('script');
      scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        document.body.appendChild(newScript);
      });
      placeholder.remove();
    })
    .then(() => {
      document.dispatchEvent(new Event('navbarLoaded'));
      // Вставляем поиск по видео в загруженную шапку, перед кнопками входа
      const actions = document.querySelector('.navbar-actions--desktop');
      if (actions) {
        const searchWrap = document.createElement('div');
        searchWrap.style.cssText = 'position:relative;';
        searchWrap.innerHTML = `
          <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="vidSearch" type="text" placeholder="Поиск видео..." style="width:220px;padding:8px 32px 8px 34px;border-radius:100px;border:1px solid var(--bg3);background:var(--bg);font-size:13px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s,width 0.2s;" onfocus="this.style.borderColor='var(--accent)';this.style.width='280px'" onblur="this.style.borderColor='var(--bg3)';this.style.width='220px'">
          <button id="vidSearchClear" onclick="clearSearch()" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;">×</button>
          <div id="vidSearchInfo" style="position:absolute;top:calc(100% + 6px);left:0;font-size:11px;color:var(--text3);white-space:nowrap;display:none;"></div>
        `;
        actions.parentNode.insertBefore(searchWrap, actions);
        initVidSearch();
      }
    });
</script>

const db = getFirestore(app);

const EMPTY = '<div style="padding:30px;text-align:center;color:var(--text3);font-size:13px;">Видео пока нет</div>';

async function loadBlock(blockName) {
  const q = query(collection(db,'videos'), where('block','==',blockName), orderBy('addedAt','desc'));
  const snap = await getDocs(q);
  return snap;
}

// ── ТОПОВЫЕ КЛИПЫ (hero + sidebar) ──
async function loadTop() {
  const snap = await loadBlock('topClips');
  const sidebar = document.getElementById('heroSidebar');
  const iframe = document.getElementById('heroIframe');
  if (snap.empty) { sidebar.innerHTML = EMPTY; return; }
  const docs = [];
  snap.forEach(d => docs.push(d.data()));
  // первое видео в main
  iframe.src = `https://www.youtube.com/embed/${docs[0].ytId}?rel=0&modestbranding=1`;
  sidebar.innerHTML = docs.map((v,i) => `
    <div class="vid-sidebar-item ${i===0?'active':''}" onclick="switchHero(this,'${v.ytId}')">
      <span class="vid-sidebar-num">${i+1}</span>
      <div class="vid-sidebar-thumb">
        <img src="${v.thumb || `https://img.youtube.com/vi/${v.ytId}/mqdefault.jpg`}" alt="">
        <div class="vid-sidebar-thumb-play"><svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg></div>
      </div>
      <div class="vid-sidebar-info">
        <div class="vid-sidebar-title">${v.title||'Без названия'}</div>
        <div class="vid-sidebar-meta">${v.artist||'992MUZ'}</div>
      </div>
    </div>`).join('');
}

async function loadMonth() {
  const snap = await loadBlock('monthClips');
  const row = document.getElementById('monthRow');
  if (snap.empty) { row.innerHTML = EMPTY; return; }
row.innerHTML = '';
  const monthDocs = [];
  snap.forEach(d => monthDocs.push(d));
  monthDocs.sort(() => Math.random() - 0.5);
  let i = 1;
  monthDocs.forEach(d => {
    const v = d.data();
    const thumb = v.thumb || `https://img.youtube.com/vi/${v.ytId}/hqdefault.jpg`;
    const rankClass = i <= 3 ? 'top3' : '';
    const rankLabel = i <= 3 ? `${i} место` : String(i);
    const likes = v.likes || 0;
    const dislikes = v.dislikes || 0;
    const total = likes + dislikes;
    const pct = total > 0 ? Math.round(likes/total*100) : 50;
    const el = document.createElement('div');
    el.className = 'vid-month-card';

<script>
let _shortIndex = 0;

function openVideo(videoId, isShort, docId) {
  const wrap = document.getElementById('vidModalInner');
  const iframeWrap = document.getElementById('vidModalWrap');
  const prevBtn = document.getElementById('shortPrev');
  const nextBtn = document.getElementById('shortNext');
  if (isShort) {
    wrap.style.width = '340px';
    wrap.style.maxWidth = '340px';
    iframeWrap.style.aspectRatio = '9/16';
    iframeWrap.style.height = '600px';
    _shortIndex = window._shortsList.indexOf(videoId);
    prevBtn.style.display = 'flex';
    nextBtn.style.display = 'flex';
  } else {
    wrap.style.width = '90%';
    wrap.style.maxWidth = '900px';
    iframeWrap.style.aspectRatio = '16/9';
    iframeWrap.style.height = '';
    prevBtn.style.display = 'none';
    nextBtn.style.display = 'none';
  }
  document.getElementById('vidModalIframe').src = `https://www.youtube.com/embed/${videoId}?rel=0&autoplay=1`;
document.getElementById('vidModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  window._currentDocId = docId || null;
  if (docId) import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(({getFirestore,doc,updateDoc,increment})=>updateDoc(doc(getFirestore(),'videos',docId),{views:increment(1)}));
}
function switchShort(dir) {
  _shortIndex += dir;
  if (_shortIndex < 0) _shortIndex = window._shortsList.length - 1;
  if (_shortIndex >= window._shortsList.length) _shortIndex = 0;
  document.getElementById('vidModalIframe').src = `https://www.youtube.com/embed/${window._shortsList[_shortIndex]}?rel=0&autoplay=1`;
  const _did = window._shortsIds?.[_shortIndex];
  window._currentDocId = _did || null;
  if (_did) import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(({getFirestore,doc,updateDoc,increment})=>updateDoc(doc(getFirestore(),'videos',_did),{views:increment(1)}));
}
let _touchStartY = 0;
document.getElementById('vidModal').addEventListener('touchstart', e => {
  _touchStartY = e.touches[0].clientY;
});
document.getElementById('vidModal').addEventListener('touchend', e => {
  const diff = _touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 50 && document.getElementById('shortPrev').style.display !== 'none') {
    switchShort(diff > 0 ? 1 : -1);
  }
});
document.getElementById('vidModal').addEventListener('wheel', e => {
  if (document.getElementById('shortPrev').style.display === 'none') return;
  switchShort(e.deltaY > 0 ? 1 : -1);
});
function closeVideoModal(e, force) {
  if (!force && e && e.target !== document.getElementById('vidModal')) return;
  document.getElementById('vidModal').style.display = 'none';
  document.getElementById('vidModalIframe').src = '';
  document.body.style.overflow = '';
}
function scrollRow(id, dir) {
  document.getElementById(id).scrollBy({ left: dir * 420, behavior: 'smooth' });
}
function vote(btn, type) {
  const voteWrap = btn.closest('.vid-vote');
  const likeBtn = voteWrap.querySelector('.vid-vote-like');
  const dislikeBtn = voteWrap.querySelector('.vid-vote-dislike');
  const fill = voteWrap.querySelector('.vid-vote-fill');
  let likes = parseInt(likeBtn.querySelector('span').textContent);
  let dislikes = parseInt(dislikeBtn.querySelector('span').textContent);
  const wasLiked = likeBtn.classList.contains('voted');
  const wasDisliked = dislikeBtn.classList.contains('voted');
  likeBtn.classList.remove('voted'); dislikeBtn.classList.remove('voted');
  if (type === 'like') {
    if (wasLiked) { likes--; } else { likes++; if (wasDisliked) dislikes--; btn.classList.add('voted'); }
  } else {
    if (wasDisliked) { dislikes--; } else { dislikes++; if (wasLiked) likes--; btn.classList.add('voted'); }
  }
  likeBtn.querySelector('span').textContent = likes;
  dislikeBtn.querySelector('span').textContent = dislikes;
  const total = likes + dislikes;
fill.style.width = total > 0 ? Math.round(likes/total*100)+'%' : '50%';
  if (window._currentDocId) import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(({getFirestore,doc,updateDoc})=>updateDoc(doc(getFirestore(),'videos',window._currentDocId),{likes,dislikes}));
}
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => scrollBtn.classList.toggle('visible', window.scrollY > 200));
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
function vidLike(btn, docId) {
  const span = btn.querySelector('span') || btn;
  const cur = parseInt(btn.textContent.replace(/\D/g,'')) || 0;
  const isLiked = btn.classList.contains('liked');
  const nv = isLiked ? cur-1 : cur+1;
  btn.classList.toggle('liked');
  btn.innerHTML = `❤️ ${nv}`;
  import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(({getFirestore,doc,updateDoc,increment})=>updateDoc(doc(getFirestore(),'videos',docId),{likes:increment(isLiked?-1:1)}));
}
function openComments(sectionId) {
  const modal = document.getElementById('vidCommentsModal');
  const body = document.getElementById('vidCommentsBody');
  body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px;">Загрузка комментариев...</div>';
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  initComments(sectionId, 'vidCommentsBody');
}
function closeComments(e, force) {
  if (!force && e && e.target !== document.getElementById('vidCommentsModal')) return;
  document.getElementById('vidCommentsModal').style.display = 'none';
  document.body.style.overflow = '';
}
function toggleExpand(rowId, btn) {
  const row = document.getElementById(rowId);
  const expanded = row.classList.toggle('expanded');
  btn.innerHTML = expanded
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg> Свернуть'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg> Смотреть все';
}
function initVidSearch() {
  const vidSearchInput = document.getElementById('vidSearch');
  const vidSearchClear = document.getElementById('vidSearchClear');
  const vidSearchInfo = document.getElementById('vidSearchInfo');
  if (!vidSearchInput) return;
  vidSearchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    vidSearchClear.style.display = q ? 'block' : 'none';
    vidSearchInfo.style.display = q ? 'block' : 'none';
    const cards = document.querySelectorAll('.vid-month-card, .vid-legend-card, .vid-live-card, .vid-short-card, .vid-sidebar-item');
    let found = 0;
    cards.forEach(card => {
      const title = (card.querySelector('.vid-month-title, .vid-legend-title, .vid-live-title, .vid-short-title, .vid-sidebar-title') || {}).textContent || '';
      const artist = (card.querySelector('.vid-month-artist, .vid-legend-sub, .vid-live-sub, .vid-sidebar-meta') || {}).textContent || '';
      const match = !q || title.toLowerCase().includes(q) || artist.toLowerCase().includes(q);
      card.style.display = match ? '' : 'none';
      if (match) found++;
    });
    vidSearchInfo.textContent = q ? `Найдено: ${found}` : '';
  });
}
window.clearSearch = function() {
  const vidSearchInput = document.getElementById('vidSearch');
  const vidSearchClear = document.getElementById('vidSearchClear');
  const vidSearchInfo = document.getElementById('vidSearchInfo');
  if (!vidSearchInput) return;
  vidSearchInput.value = '';
  vidSearchClear.style.display = 'none';
  vidSearchInfo.style.display = 'none';
  document.querySelectorAll('.vid-month-card, .vid-legend-card, .vid-live-card, .vid-short-card, .vid-sidebar-item').forEach(c => c.style.display = '');
}
</script>
<script type="module">
import { getFirestore, collection, getDocs, query, orderBy, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

async function loadTopComment(sectionId) {
  const el = document.getElementById('topComment_' + sectionId);
  if (!el) return;
  const db = getFirestore();
  const snap = await getDocs(query(collection(db, 'comments', sectionId, 'messages'), orderBy('likes','desc')));
  const comments = [];
  snap.forEach(d => { const data = d.data(); if ((data.likes||0) >= 50) comments.push(data); });
  if (!comments.length) return;
  let idx = 0;
  function show() {
    const c = comments[idx % comments.length];
    el.innerHTML = `<span class="vtc-heart"><img src="assets/icons/com.png" style="width:12px;height:12px;vertical-align:middle;"> ${c.likes||0}</span><span class="vtc-text">${c.displayName||'Аноним'}: ${c.text||''}</span>`;
    el.classList.remove('vtc-in');
    void el.offsetWidth;
    el.classList.add('vtc-in');
    idx++;
  }
  show();
  setInterval(show, 4000);
}

['top_clips','shorts','legends','month_clips','992MUZ'].forEach(loadTopComment);
</script>

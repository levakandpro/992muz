<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - 992MUZ</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(124,111,205,0.15) 0%, transparent 70%),
        linear-gradient(180deg, #0d0d0d 0%, #111018 100%);
      z-index: 0;
    }
    .bg::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40vh;
      background: url('../assets/icons/mountain2.png') center bottom / cover no-repeat;
      opacity: 0.08;
    }

    .auth-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 16px;
      padding-top: 32px;
      padding-bottom: 32px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo img { height: 48px; margin-bottom: 12px; }
    .auth-logo h1 { font-family: 'Unbounded', sans-serif; font-size: 22px; color: #fff; letter-spacing: -0.5px; }
    .auth-logo p { color: #666; font-size: 13px; margin-top: 4px; }

    .auth-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(20px);
    }

    .auth-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .2s;
      margin-bottom: 20px;
    }
    .auth-google:hover { background: rgba(255,255,255,0.1); }
    .auth-google svg { width: 18px; height: 18px; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: #444;
      font-size: 12px;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; color: #888; font-size: 12px; margin-bottom: 6px; }
    .auth-field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s;
    }
    .auth-field input:focus { border-color: #7c6fcd; }
    .auth-field input::placeholder { color: #555; }

    /* Индикатор силы пароля */
    .password-strength { display: flex; gap: 4px; margin-top: 8px; }
    .password-strength span {
      flex: 1;
      height: 3px;
      border-radius: 100px;
      background: #333;
      transition: background .3s;
    }
    .strength-weak span:nth-child(1) { background: #e74c3c; }
    .strength-medium span:nth-child(1), .strength-medium span:nth-child(2) { background: #f39c12; }
    .strength-strong span { background: #2ecc71; }

    .auth-submit {
      width: 100%;
      padding: 13px;
      background: #7c6fcd;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: -0.3px;
      margin-top: 4px;
    }
    .auth-submit:hover { opacity: 0.9; }
    .auth-submit:active { transform: scale(0.98); }
    .auth-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .auth-message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-message--error { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; }
    .auth-message--success { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.3); color: #2ecc71; }

    .auth-terms {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      color: #555;
      font-size: 13px;
    }
    .auth-switch a { color: #7c6fcd; text-decoration: none; font-weight: 500; }
    .auth-switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="auth-wrap">
    <div class="auth-logo">
      <img src="assets/icons/logo.png" alt="992UZ">
      <h1>992MUZ</h1>
      <p>Создай аккаунт</p>
    </div>

    <div class="auth-card">
      <button class="auth-google" id="googleRegisterBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Войти через Google
      </button>

      <div class="auth-divider">или</div>

      <div id="registerError" class="auth-message"></div>

      <form id="registerForm">
        <div class="auth-field">
          <label>Имя</label>
          <input type="text" id="registerName" placeholder="Твоё имя" required>
        </div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="example@mail.com" required>
        </div>
        <div class="auth-field">
          <label>Пароль</label>
          <input type="password" id="registerPassword" placeholder="Минимум 6 символов" required>
          <div class="password-strength" id="passwordStrength">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="auth-field">
          <label>Повтори пароль</label>
          <input type="password" id="registerPassword2" placeholder="••••••••" required>
        </div>

        <button type="submit" class="auth-submit" id="registerSubmitBtn">Зарегистрироваться</button>
      </form>

      <p class="auth-terms">Регистрируясь, ты соглашаешься с условиями использования 992MUZ</p>
    </div>

    <div class="auth-switch">
      Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
  </div>

  <script type="module">
    // Индикатор силы пароля
    const pwInput = document.getElementById('registerPassword');
    const strengthEl = document.getElementById('passwordStrength');
    pwInput?.addEventListener('input', () => {
      const val = pwInput.value;
      strengthEl.className = 'password-strength';
      if (val.length === 0) return;
      if (val.length < 6) strengthEl.classList.add('strength-weak');
      else if (val.length < 10) strengthEl.classList.add('strength-medium');
      else strengthEl.classList.add('strength-strong');
    });
  </script>
  <script type="module" src="js/auth/register.js"></script>
</body>
</html>
